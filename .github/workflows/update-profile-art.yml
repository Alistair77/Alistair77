name: Update profile art

# Re-scrapes your public contributions and re-renders the heatmap daily.
# No token needed — GitHub's contributions fragment is public. The built-in
# GITHUB_TOKEN only commits the regenerated SVG back to the repo.
on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch: {}     # lets you trigger it by hand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Scrape contributions
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contrib-heatmap.svg data/contributions.json
          if git diff --cached --quiet; then
            echo "No change in contributions."
          else
            git commit -m "chore: refresh contribution graph"
            git push
          fi
